{% extends "base.html" %}
{% block title %}Contacto - AF WEB STUDIO{% endblock %}
{% block content %}
<section class="py-6">
  <div class="container">
    <h2 class="mb-4 text-blue">Contacto</h2>
    {% if sent %}
      <div class="alert alert-success">Gracias, tu mensaje fue recibido (implementación de ejemplo).</div>
    {% else %}
      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input name="name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Mensaje</label>
          <textarea name="message" rows="5" class="form-control" required></textarea>
        </div>
        <div class="col-12">
          <button class="btn btn-primary">Enviar</button>
        </div>
      </form>
    {% endif %}
  </div>
</section>
{% endblock %}
